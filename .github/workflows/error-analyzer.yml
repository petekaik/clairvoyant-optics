# Virheanalysoija — analysoi auto-reported bugit päivittäin
#
# Hakee kaikki avoimet issuet labeleilla "bug,auto-reported",
# ryhmittelee ne virhetyypin mukaan, tunnistaa toistuvat patternit,
# ja luo yhteenveto-issuen kehittäjälle.
#
# Tämä mahdollistaa sovelluksen jatkuvan parantamisen ilman
# käyttäjän manuaalista raportointia.

name: Error Issue Analyzer

on:
  schedule:
    # Ajetaan kerran päivässä klo 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:  # Manuaalinen ajo GH Actions UI:sta

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    if: github.repository == 'petekaik/clairvoyant-optics'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze Error Issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Hae kaikki avoimet auto-reported bug-issuet
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: "open",
                labels: "bug,auto-reported",
                per_page: 100,
              }
            );

            if (issues.length === 0) {
              console.log("No auto-reported issues to analyze.");
              return;
            }

            console.log(`Found ${issues.length} auto-reported issue(s)`);

            // 2. Ryhmittele virhetyypin mukaan
            //    Title-muoto: "[auto] src.module.ErrorName: message"
            const groups = {};
            for (const issue of issues) {
              const title = issue.title;
              // Parse error type: "[auto] <type>: <msg>"
              const match = title.match(/^\[auto\] (.+?):/);
              const errorType = match ? match[1] : "unknown";
              if (!groups[errorType]) {
                groups[errorType] = { issues: [], totalCount: 0 };
              }
              groups[errorType].issues.push(issue);
              groups[errorType].totalCount++;

              // Katso onko body:ssa mention count (comment-laskenta)
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              // Jos on aiempia "Me too" -kommentteja, laske ne mukaan
            }

            // 3. Luo yhteenveto
            let report = "## 📊 Daily Error Report\n\n";
            report += `**Date:** ${new Date().toISOString().slice(0, 10)}\n`;
            report += `**Auto-reported issues:** ${issues.length} open\n\n`;
            report += "---\n\n";

            const sorted = Object.entries(groups)
              .sort((a, b) => b[1].totalCount - a[1].totalCount);

            for (const [errorType, group] of sorted) {
              report += `### ${errorType} (${group.totalCount} occurrence${group.totalCount > 1 ? 's' : ''})\n\n`;
              for (const issue of group.issues) {
                const date = new Date(issue.created_at).toLocaleDateString("en-US", {
                  month: "short", day: "numeric",
                });
                report += `- [#${issue.number}](${issue.html_url}) — ${date}\n`;
                // Katkaise lyhyt ote body:stä
                const body = issue.body || "";
                const shortMsg = body.match(/\*\*Message:\*\* (.+)/);
                if (shortMsg) {
                  report += `  - Message: \`${shortMsg[1].slice(0, 120)}\`\n`;
                }
              }
              report += "\n";
            }

            report += "---\n";
            report += "> 🤖 Generated by Error Issue Analyzer workflow.\n";
            report += `> Run: [${context.runId}](https://github.com/${owner}/${repo}/actions/runs/${context.runId})\n`;

            // 4. Luo/päivitä yhteenveto-issue
            const summaryLabel = "error-summary";
            const summaryTitle = `📊 Error Summary — ${new Date().toISOString().slice(0, 7)}`;

            // Etsi olemassa oleva kuukausikohtainen summary
            const existingSummaries = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", labels: summaryLabel, per_page: 10 }
            );

            const currentSummary = existingSummaries.find(
              i => i.title.startsWith(summaryTitle)
            );

            if (currentSummary) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: currentSummary.number,
                body: report,
              });
              console.log(`Updated summary issue #${currentSummary.number}`);
            } else {
              const newIssue = await github.rest.issues.create({
                owner, repo,
                title: summaryTitle,
                body: report,
                labels: [summaryLabel],
              });
              console.log(`Created summary issue #${newIssue.data.number}`);
            }
