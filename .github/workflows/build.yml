name: Build macOS App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Download ML models
        run: |
          python download_models.py --ci-mode 2>&1 || echo "⚠ Models may be cached, continuing..."

      - name: Set version
        id: version
        run: |
          VERSION=$(python3 -c 'from src.version import VERSION; print(VERSION)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name=Clairvoyant-Optics \
            --onefile \
            --windowed \
            --add-data "src:src" \
            --add-data "models:models" \
            --hidden-import src \
            --hidden-import src.cli \
            --hidden-import src.main \
            --hidden-import src.config \
            --hidden-import src.recognition \
            --hidden-import src.detection \
            --hidden-import src.streams \
            --hidden-import src.integration \
            --hidden-import src.utils \
            --hidden-import src.macos \
            --hidden-import insightface \
            --hidden-import insightface.app \
            --hidden-import ultralytics \
            --hidden-import cv2 \
            --hidden-import onnxruntime \
            --hidden-import fastapi \
            --hidden-import uvicorn \
            --hidden-import rumps \
            --hidden-import macos_notifications \
            --hidden-import osxphotos \
            src/macos/menubar_app.py

      - name: Create .app bundle
        run: |
          mkdir -p dist/Clairvoyant-Optics.app/Contents/MacOS
          mkdir -p dist/Clairvoyant-Optics.app/Contents/Resources
          cp dist/Clairvoyant-Optics dist/Clairvoyant-Optics.app/Contents/MacOS/
          cat > dist/Clairvoyant-Optics.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Clairvoyant-Optics</string>
            <key>CFBundleDisplayName</key><string>Clairvoyant-Optics</string>
            <key>CFBundleIdentifier</key><string>fi.kaikkonen.clairvoyant-optics</string>
            <key>CFBundleVersion</key><string>${{ steps.version.outputs.version }}</string>
            <key>CFBundleShortVersionString</key><string>${{ steps.version.outputs.version }}</string>
            <key>CFBundleExecutable</key><string>Clairvoyant-Optics</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Code sign & clean
        run: |
          codesign --force --sign - dist/Clairvoyant-Optics.app
          xattr -cr dist/Clairvoyant-Optics.app

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Clairvoyant-Optics-${VERSION}.dmg"
          hdiutil create -volname "Clairvoyant-Optics" \
            -srcfolder dist/Clairvoyant-Optics.app \
            -ov -format UDZO "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clairvoyant-optics-dmg
          path: dist/*.dmg

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
