name: Build macOS App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Download ML models
        run: |
          python download_models.py --ci-mode 2>&1 || echo "⚠ Models may be cached, continuing..."

      - name: Set version
        id: version
        run: |
          VERSION=$(python3 -c 'from src.version import VERSION; print(VERSION)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller \
            --name=Clairvoyant-Optics \
            --onedir \
            --windowed \
            --icon=icon.icns \
            --osx-bundle-identifier=fi.kaikkonen.clairvoyant-optics \
            --add-data "src:src" \
            --add-data "models:models" \
            --hidden-import src \
            --hidden-import src.cli \
            --hidden-import src.main \
            --hidden-import src.config \
            --hidden-import src.recognition \
            --hidden-import src.detection \
            --hidden-import src.streams \
            --hidden-import src.integration \
            --hidden-import src.utils \
            --hidden-import src.macos \
            --hidden-import insightface \
            --hidden-import insightface.app \
            --hidden-import ultralytics \
            --hidden-import cv2 \
            --hidden-import onnxruntime \
            --hidden-import fastapi \
            --hidden-import uvicorn \
            --hidden-import rumps \
            --hidden-import macos_notifications \
            --hidden-import osxphotos \
            --hidden-import tkinter \
            --hidden-import src.macos.battery_optimizer \
            src/macos/menubar_app.py

      - name: Code sign & clean
        run: |
          codesign --force --deep --sign - dist/Clairvoyant-Optics.app
          find dist/Clairvoyant-Optics.app -exec xattr -c {} \; 2>/dev/null || true

      - name: 🧪 Smoke test (verify app launches + API responds)
        run: |
          APP="dist/Clairvoyant-Optics.app"
          BINARY="$APP/Contents/MacOS/Clairvoyant-Optics"

          echo "=== Bundle structure ==="
          ls -la "$APP/Contents/Info.plist" || { echo "❌ No Info.plist"; exit 1; }
          ls -la "$APP/Contents/Resources/icon.icns" || echo "⚠ No icon file"
          ls -la "$BINARY" || { echo "❌ No executable"; exit 1; }

          echo "=== Launch test (5s timeout) ==="
          # Start app in background, wait for API, kill
          "$BINARY" &
          PID=$!
          echo "App PID: $PID"

          # Poll /api/status up to 15s
          for i in $(seq 1 15); do
            sleep 1
            if curl -sf http://127.0.0.1:8765/api/status > /dev/null 2>&1; then
              echo "✅ API responded after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "❌ API never responded — APP IS BROKEN"
              kill $PID 2>/dev/null || true
              exit 1
            fi
          done

          # Verify response structure
          RESP=$(curl -s http://127.0.0.1:8765/api/status)
          echo "API response: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ state:', d.get('state','?'))" || {
            echo "❌ Invalid JSON response"
            kill $PID 2>/dev/null || true
            exit 1
          }

          # Cleanup
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null
          echo "=== Smoke test PASSED ==="

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Clairvoyant-Optics-${VERSION}.dmg"
          hdiutil create -volname "Clairvoyant-Optics" \
            -srcfolder dist/Clairvoyant-Optics.app \
            -ov -format UDZO "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clairvoyant-optics-dmg
          path: dist/*.dmg

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
