name: Build macOS App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install py2app
          brew install create-dmg 2>/dev/null || true

      - name: Download ML models
        run: python download_models.py || echo "Models may be cached"

      - name: Set version
        id: version
        run: |
          VERSION=$(python3 -c 'from src.version import VERSION; print(VERSION)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build .app bundle
        run: python setup.py py2app

      - name: Create placeholder icon
        run: |
          if [ ! -f assets/icon.icns ]; then
            mkdir -p assets
            touch assets/icon.icns
          fi

      - name: Package DMG
        run: |
          APP="dist/Clairvoyant-Optics.app"
          DMG="dist/Clairvoyant-Optics-${{ steps.version.outputs.version }}.dmg"
          if command -v create-dmg &>/dev/null; then
            create-dmg --volname "Clairvoyant-Optics" "$DMG" "$APP" || \
            hdiutil create -volname "Clairvoyant-Optics" -srcfolder dist -ov -format UDZO "$DMG"
          else
            hdiutil create -volname "Clairvoyant-Optics" -srcfolder dist -ov -format UDZO "$DMG"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clairvoyant-optics-dmg
          path: dist/*.dmg

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
