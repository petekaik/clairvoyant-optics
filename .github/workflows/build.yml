name: Build macOS App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-build.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyinstaller pyyaml

      - name: Set version
        id: version
        run: |
          VERSION=$(python3 -c 'from src.version import VERSION; print(VERSION)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache PyInstaller work dir
        uses: actions/cache@v4
        with:
          path: |
            build/
            *.spec
          key: ${{ runner.os }}-pyinstaller-${{ steps.version.outputs.version }}-${{ hashFiles('src/macos/menubar_app.py', 'icon.icns') }}
          restore-keys: ${{ runner.os }}-pyinstaller-

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller \
            --name=Clairvoyant-Optics \
            --onedir \
            --windowed \
            --icon=icon.icns \
            --osx-bundle-identifier=fi.kaikkonen.clairvoyant-optics \
            --add-data "icon.icns:." \
            --hidden-import tkinter \
            src/macos/menubar_app.py

      - name: Code sign & clean
        run: |
          codesign --force --deep --sign - dist/Clairvoyant-Optics.app
          find dist/Clairvoyant-Optics.app -exec xattr -c {} \; 2>/dev/null || true

      - name: 🧪 Smoke test (verify app launches without crash)
        run: |
          APP="dist/Clairvoyant-Optics.app"
          BINARY="$APP/Contents/MacOS/Clairvoyant-Optics"

          echo "=== Bundle structure ==="
          ls -la "$APP/Contents/Info.plist" || { echo "❌ No Info.plist"; exit 1; }
          ls -la "$APP/Contents/Resources/icon.icns" || echo "⚠ No icon file"
          ls -la "$BINARY" || { echo "❌ No executable"; exit 1; }

          echo "=== Launch & health check ==="
          "$BINARY" &
          PID=$!
          echo "App PID: $PID"

          # Wait 3s and verify process is still alive (no immediate crash)
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "✅ App alive after 3s"
          else
            echo "❌ App crashed — exit code: $(wait $PID 2>/dev/null; echo $?)"
            exit 1
          fi

          # Cleanup
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null
          echo "=== Smoke test PASSED ==="

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Clairvoyant-Optics-${VERSION}.dmg"
          hdiutil create -volname "Clairvoyant-Optics" \
            -srcfolder dist/Clairvoyant-Optics.app \
            -ov -format UDZO "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clairvoyant-optics-dmg
          path: dist/*.dmg

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
