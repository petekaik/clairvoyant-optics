name: Build macOS App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Download ML models
        run: |
          python download_models.py --ci-mode 2>&1 || echo "⚠ Models may be cached, continuing..."

      - name: Set version
        id: version
        run: |
          VERSION=$(python3 -c 'from src.version import VERSION; print(VERSION)')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller \
            --name=Clairvoyant-Optics \
            --onedir \
            --windowed \
            --icon=icon.icns \
            --osx-bundle-identifier=fi.kaikkonen.clairvoyant-optics \
            --add-data "src:src" \
            --add-data "models:models" \
            --hidden-import src \
            --hidden-import src.cli \
            --hidden-import src.main \
            --hidden-import src.config \
            --hidden-import src.recognition \
            --hidden-import src.detection \
            --hidden-import src.streams \
            --hidden-import src.integration \
            --hidden-import src.utils \
            --hidden-import src.macos \
            --hidden-import insightface \
            --hidden-import insightface.app \
            --hidden-import ultralytics \
            --hidden-import cv2 \
            --hidden-import onnxruntime \
            --hidden-import fastapi \
            --hidden-import uvicorn \
            --hidden-import rumps \
            --hidden-import macos_notifications \
            --hidden-import osxphotos \
            --hidden-import tkinter \
            --hidden-import src.macos.battery_optimizer \
            src/macos/menubar_app.py

      - name: Code sign & clean
        run: |
          codesign --force --deep --sign - dist/Clairvoyant-Optics.app
          find dist/Clairvoyant-Optics.app -exec xattr -c {} \; 2>/dev/null || true

      - name: Package DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Clairvoyant-Optics-${VERSION}.dmg"
          hdiutil create -volname "Clairvoyant-Optics" \
            -srcfolder dist/Clairvoyant-Optics.app \
            -ov -format UDZO "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clairvoyant-optics-dmg
          path: dist/*.dmg

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
